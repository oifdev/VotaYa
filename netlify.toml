[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# The @netlify/plugin-nextjs is auto-installed by Netlify when it detects Next.js.
# This ensures SSR, API routes, and middleware work as serverless functions.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
